<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- A poi head with a fading light trail, on the app's black background. -->
  <defs>
    <linearGradient id="trail" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#7b2ff7" stop-opacity="0"/>
      <stop offset="0.6" stop-color="#00c2ff" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#7dfcff"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="#000"/>
  <path d="M18 46 A 19 19 0 1 1 46 43" fill="none" stroke="url(#trail)" stroke-width="7" stroke-linecap="round"/>
  <circle cx="46" cy="43" r="6.5" fill="#eaffff"/>
</svg>
